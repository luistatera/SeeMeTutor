<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC 02 — Proactive Vision</title>
  <!-- Silero VAD for speech detection + audio gating -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1B2A;
      --bg-card: #16293D;
      --border: rgba(66, 133, 244, 0.2);
      --blue: #4285F4;
      --green: #34A853;
      --red: #EA4335;
      --yellow: #FBBC04;
      --orange: #FF6D00;
      --purple: #A855F7;
      --cyan: #00BCD4;
      --text: #E8EFF8;
      --text-dim: #8DA8C4;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 820px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100vh;
    }

    h1 { font-size: 20px; font-weight: 700; color: var(--purple); }
    h1 span { color: var(--text-dim); font-weight: 400; font-size: 13px; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-card);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .status-dot {
      width: 13px; height: 13px; border-radius: 50%;
      background: #4A6A88; flex-shrink: 0;
      transition: all 0.15s;
    }
    .status-dot.listening { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .status-dot.speaking { background: var(--blue); box-shadow: 0 0 10px var(--blue); animation: pulse 1s infinite; }
    .status-dot.proactive { background: var(--purple); box-shadow: 0 0 12px var(--purple); animation: pulse 0.8s infinite; }
    .status-dot.interrupted { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
    .status-dot.vad-speech { background: var(--green); box-shadow: 0 0 12px var(--orange); }
    .status-dot.error { background: var(--red); }
    .status-label { font-size: 13px; color: var(--text-dim); flex: 1; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ── Camera + controls row ── */
    .cam-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .camera-section {
      flex: 0 0 240px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .camera-section video {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #000;
      display: block;
    }
    .camera-off-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-dim);
      font-size: 13px;
      pointer-events: none;
    }

    .controls-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Buttons ── */
    button {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: var(--font);
    }
    .btn-session { background: var(--green); color: white; width: 100%; }
    .btn-session.active { background: var(--red); }
    .btn-session:hover { opacity: 0.9; }

    .toggle-row { display: flex; gap: 8px; }

    .btn-toggle {
      flex: 1;
      background: var(--bg-card); color: var(--text-dim);
      border: 1px solid var(--border);
      font-size: 12px; padding: 8px 10px;
    }
    .btn-toggle.active { color: var(--green); border-color: rgba(52, 168, 83, 0.4); }
    .btn-toggle.active.camera { color: var(--blue); border-color: rgba(66, 133, 244, 0.4); }
    .btn-toggle:hover { background: #1a3149; }

    .btn-secondary {
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border);
      font-size: 12px; padding: 8px 10px;
    }
    .btn-secondary:hover { background: #1a3149; }

    /* ── Silence progress bar ── */
    .silence-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 26px;
      position: relative;
      overflow: hidden;
    }
    .silence-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.15s linear, background-color 0.3s;
      border-radius: 8px;
    }
    .silence-fill.warning { background: var(--yellow); }
    .silence-fill.critical { background: var(--orange); }
    .silence-fill.triggered { background: var(--purple); }
    .silence-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px; font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    /* ── Metrics grid ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 6px;
    }
    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .metric-value {
      font-size: 22px; font-weight: 700;
      color: var(--blue); line-height: 1.2;
    }
    .metric-value.purple { color: var(--purple); }
    .metric-value.cyan { color: var(--cyan); }
    .metric-value.green { color: var(--green); }
    .metric-value.orange { color: var(--orange); }
    .metric-label {
      font-size: 9px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;
    }

    /* ── Transcript ── */
    .transcript-panel {
      flex: 1; min-height: 180px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      overflow-y: auto; font-size: 13px; line-height: 1.6;
    }
    .transcript-panel::-webkit-scrollbar { width: 6px; }
    .transcript-panel::-webkit-scrollbar-thumb { background: rgba(66,133,244,0.3); border-radius: 3px; }

    .t-entry { margin-bottom: 5px; }
    .t-time { color: var(--text-dim); font-size: 11px; margin-right: 6px; }
    .t-label { font-weight: 600; margin-right: 4px; }
    .t-entry.tutor .t-label, .t-entry.tutor .t-text { color: var(--blue); }
    .t-entry.student .t-label, .t-entry.student .t-text { color: var(--green); }
    .t-entry.event .t-label, .t-entry.event .t-text { color: var(--yellow); }
    .t-entry.proactive .t-label, .t-entry.proactive .t-text { color: var(--purple); font-weight: 600; }
    .t-entry.nudge .t-label, .t-entry.nudge .t-text { color: var(--cyan); font-weight: 600; }
    .t-entry.error .t-label, .t-entry.error .t-text { color: var(--red); }

    /* ── Event log ── */
    .event-log {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; max-height: 140px;
      overflow-y: auto; font-size: 11px;
      font-family: 'SF Mono', Monaco, 'Consolas', monospace;
      color: var(--text-dim);
    }
    .event-log::-webkit-scrollbar { width: 6px; }
    .event-log::-webkit-scrollbar-thumb { background: rgba(66,133,244,0.3); border-radius: 3px; }
    .evt { margin-bottom: 2px; }
    .evt-proactive { color: var(--purple); }
    .evt-nudge { color: var(--cyan); }
    .evt-vad { color: var(--orange); }
    .evt-int { color: var(--yellow); }
    .evt-tc { color: var(--blue); }
    .evt-video { color: var(--text-dim); }
  </style>
</head>
<body>
  <div id="app">
    <h1>POC 02 — Proactive Vision <span>SeeMe Tutor</span></h1>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-label" id="statusLabel">Ready — click Start Session to begin</div>
    </div>

    <!-- Camera + controls -->
    <div class="cam-row">
      <div class="camera-section">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <canvas id="cameraCanvas" style="display:none;"></canvas>
        <div class="camera-off-label" id="cameraOffLabel">Camera off</div>
      </div>

      <div class="controls-section">
        <button class="btn-session" id="btnSession" onclick="toggleSession()">Start Session</button>
        <div class="toggle-row">
          <button class="btn-toggle camera" id="btnCamera" onclick="toggleCamera()">Camera Off</button>
          <button class="btn-toggle active" id="btnVad" onclick="toggleVAD()">VAD On</button>
          <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>
        <!-- Silence progress bar -->
        <div class="silence-bar">
          <div class="silence-fill" id="silenceFill"></div>
          <div class="silence-text" id="silenceText">Silence: 0.0s / 15s</div>
        </div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-value purple" id="mProactive">0</div>
        <div class="metric-label">Proactive Triggers</div>
      </div>
      <div class="metric-card">
        <div class="metric-value cyan" id="mNudges">0</div>
        <div class="metric-label">Backend Nudges</div>
      </div>
      <div class="metric-card">
        <div class="metric-value green" id="mOrganic">0 / 0</div>
        <div class="metric-label">Organic / Nudge</div>
      </div>
      <div class="metric-card">
        <div class="metric-value purple" id="mAvgTrigger">&mdash;</div>
        <div class="metric-label">Avg Trigger (s)</div>
      </div>
      <div class="metric-card">
        <div class="metric-value" id="mTurns">0</div>
        <div class="metric-label">Turns</div>
      </div>
      <div class="metric-card">
        <div class="metric-value orange" id="mFalsePos">0</div>
        <div class="metric-label">False Positives</div>
      </div>
      <div class="metric-card">
        <div class="metric-value" id="mVideoFps">0.0</div>
        <div class="metric-label">Video FPS</div>
      </div>
      <div class="metric-card">
        <div class="metric-value" id="mVideoFrames">0</div>
        <div class="metric-label">Frames Sent</div>
      </div>
    </div>

    <div class="transcript-panel" id="transcript"></div>
    <div class="event-log" id="eventLog"></div>
  </div>

  <script>
    // =========================================================================
    // State
    // =========================================================================
    var ws = null;
    var sessionActive = false;

    // Audio
    var audioCtx = null;
    var micStream = null;
    var processorNode = null;

    // Camera
    var cameraStream = null;
    var cameraVideo = null;
    var cameraCanvas = null;
    var cameraCtx2d = null;
    var cameraInterval = null;
    var cameraActive = false;
    var CAMERA_FPS = 1;
    var CAMERA_WIDTH = 640;
    var CAMERA_HEIGHT = 480;
    var CAMERA_QUALITY = 0.7;

    // VAD state
    var vadInstance = null;
    var vadEnabled = true;
    var vadReady = false;
    var vadSpeechActive = false;
    var vadInitialized = false;
    var vadGraceTimer = null;
    var VAD_GRACE_MS = 500;

    // Tutor speaking state
    var tutorSpeaking = false;
    var tutorSpeakingStartedAt = 0;
    var lastTutorAudioAt = 0;

    // Student speaking state
    var studentSpeaking = false;

    // Audio playback
    var playbackCtx = null;
    var nextPlayTime = 0;
    var scheduledSources = [];
    var PLAYBACK_RATE = 24000;
    var turnCompletePending = false;

    // Silence tracking
    var silenceStartedAt = 0;
    var silenceTimerInterval = null;
    var IDLE_THRESHOLD_S = 15;

    // Metrics
    var proactiveCount = 0;
    var organicCount = 0;
    var nudgeCount = 0;
    var backendNudges = 0;
    var falsePositives = 0;
    var turnCount = 0;
    var triggerSilences = [];
    var videoFramesSent = 0;
    var videoFpsWindow = [];     // timestamps of recent frames for FPS calc

    // =========================================================================
    // VAD — simplified for speech detection + audio gating (no barge-in logic)
    // =========================================================================
    async function ensureVAD() {
      if (vadInitialized) return;
      vadInitialized = true;

      if (typeof vad === 'undefined') {
        logEvent('VAD library not loaded — running without VAD');
        vadReady = false;
        return;
      }

      try {
        logEvent('Loading Silero VAD v5...');
        vadInstance = await vad.MicVAD.new({
          positiveSpeechThreshold: 0.72,
          negativeSpeechThreshold: 0.45,
          minSpeechMs: 260,
          redemptionMs: 700,
          preSpeechPadMs: 0,
          model: "v5",
          baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/",
          onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
          onSpeechStart: onVADSpeechStart,
          onSpeechEnd: onVADSpeechEnd,
          onVADMisfire: function() { logEvent('VAD: misfire', 'evt-vad'); },
        });
        vadReady = true;
        logEvent('VAD ready (threshold=0.72)');
      } catch (err) {
        logEvent('VAD init FAILED: ' + err.message);
        vadReady = false;
      }
    }

    function onVADSpeechStart() {
      if (vadGraceTimer) { clearTimeout(vadGraceTimer); vadGraceTimer = null; }
      if (!sessionActive) return;

      vadSpeechActive = true;
      studentSpeaking = true;
      stopSilenceTimer();

      // Notify backend
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'speech_start' }));
      }

      logEvent('VAD: speech START', 'evt-vad');
      setStatus('vad-speech', 'Student speaking...');

      // If tutor is speaking, cancel playback (basic interruption)
      if (tutorSpeaking) {
        cancelPlayback();
        tutorSpeaking = false;
        tutorSpeakingStartedAt = 0;
        turnCompletePending = false;
        logEvent('VAD: barge-in — playback cancelled', 'evt-vad');

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'barge_in', client_latency_ms: 0 }));
        }
      }
    }

    function onVADSpeechEnd(audio) {
      if (vadGraceTimer) clearTimeout(vadGraceTimer);
      vadGraceTimer = setTimeout(function() {
        vadSpeechActive = false;
        studentSpeaking = false;
        vadGraceTimer = null;

        // Notify backend
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'speech_end' }));
        }

        logEvent('VAD: speech END', 'evt-vad');

        // Start silence timer if tutor is also silent
        if (!tutorSpeaking) {
          startSilenceTimer();
          setStatus('listening', 'Listening (silent)...');
        }
      }, VAD_GRACE_MS);
    }

    function toggleVAD() {
      vadEnabled = !vadEnabled;
      var btn = document.getElementById('btnVad');
      if (vadEnabled) {
        btn.classList.add('active');
        btn.textContent = 'VAD On';
        vadSpeechActive = false;
      } else {
        btn.classList.remove('active');
        btn.textContent = 'VAD Off';
        vadSpeechActive = true;
      }
      logEvent('VAD gate ' + (vadEnabled ? 'ON' : 'OFF'));
    }

    // =========================================================================
    // WebSocket
    // =========================================================================
    function connectWS() {
      var proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host + '/ws');
      ws.onopen = function() { logEvent('WS connected'); };
      ws.onclose = function() {
        setStatus('error', 'Disconnected');
        logEvent('WS disconnected');
        if (sessionActive) setTimeout(connectWS, 2000);
      };
      ws.onerror = function() { setStatus('error', 'Connection error'); };
      ws.onmessage = handleMessage;
    }

    function handleMessage(evt) {
      var msg = JSON.parse(evt.data);

      switch (msg.type) {
        case 'audio':
          turnCompletePending = false;
          if (!tutorSpeaking) {
            tutorSpeaking = true;
            tutorSpeakingStartedAt = performance.now();
            stopSilenceTimer();
          }
          lastTutorAudioAt = performance.now();
          playAudioChunk(msg.data);
          setStatus('speaking', 'Tutor speaking...');
          break;

        case 'text':
        case 'output_transcript':
          addTranscript('tutor', msg.data);
          break;

        case 'input_transcript':
          addTranscript('student', msg.data);
          break;

        case 'interrupted':
          turnCompletePending = false;
          cancelPlayback();
          tutorSpeaking = false;
          tutorSpeakingStartedAt = 0;
          setStatus('interrupted', 'Interrupted');
          addTranscript('event', 'INTERRUPTED');
          logEvent('GEMINI INTERRUPTED', 'evt-int');
          setTimeout(function() {
            if (sessionActive && !tutorSpeaking) setStatus('listening', 'Listening...');
          }, 1000);
          break;

        case 'turn_complete':
          turnCount = (msg.data && msg.data.count) || turnCount + 1;
          turnCompletePending = true;
          logEvent('TURN_COMPLETE #' + turnCount, 'evt-tc');
          maybeFinalizeTurnComplete();
          updateMetrics();
          break;

        case 'proactive_trigger':
          handleProactiveTrigger(msg.data);
          break;

        case 'idle_nudge':
          handleIdleNudge(msg.data);
          break;

        case 'error':
          addTranscript('error', msg.data);
          setStatus('error', 'Error');
          break;
      }
    }

    function handleProactiveTrigger(data) {
      proactiveCount = data.count || proactiveCount + 1;
      var silenceS = data.silence_s || 0;
      var type = data.trigger_type || 'organic';

      if (type === 'organic') organicCount++;
      else nudgeCount++;

      if (!data.camera_active) falsePositives++;

      triggerSilences.push(silenceS);

      setStatus('proactive', 'Proactive trigger! (' + silenceS.toFixed(1) + 's)');
      addTranscript('proactive',
        'PROACTIVE [' + type + '] after ' + silenceS.toFixed(1) + 's silence' +
        (data.camera_active ? '' : ' (FALSE POSITIVE: camera off)')
      );
      logEvent(
        'PROACTIVE #' + proactiveCount + ' [' + type + '] silence=' + silenceS.toFixed(1) + 's',
        'evt-proactive'
      );
      updateMetrics();
    }

    function handleIdleNudge(data) {
      backendNudges = data.count || backendNudges + 1;
      addTranscript('nudge',
        'BACKEND NUDGE #' + backendNudges + ' after ' + (data.silence_s || 0).toFixed(1) + 's'
      );
      logEvent(
        'IDLE_NUDGE #' + backendNudges + ' silence=' + (data.silence_s || 0).toFixed(1) + 's',
        'evt-nudge'
      );
      updateMetrics();
    }

    // =========================================================================
    // Session control — starts mic + camera + WebSocket together
    // =========================================================================
    async function toggleSession() {
      if (sessionActive) {
        await stopSession();
      } else {
        await startSession();
      }
    }

    async function startSession() {
      try {
        setStatus('', 'Starting session...');

        // 1. Connect WebSocket
        connectWS();

        // 2. Init VAD
        await ensureVAD();

        // 3. Start mic
        audioCtx = new AudioContext({ sampleRate: 16000 });
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          }
        });

        var source = audioCtx.createMediaStreamSource(micStream);
        processorNode = audioCtx.createScriptProcessor(4096, 1, 1);

        var silenceBuffer = new Int16Array(4096);
        processorNode.onaudioprocess = function(e) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          var float32 = e.inputBuffer.getChannelData(0);
          var shouldSendReal = vadEnabled && vadReady ? vadSpeechActive : true;
          var b64;
          if (shouldSendReal) {
            b64 = arrayBufferToBase64(float32ToInt16(float32).buffer);
          } else {
            b64 = arrayBufferToBase64(silenceBuffer.buffer);
          }
          ws.send(JSON.stringify({ type: 'audio', data: b64 }));
        };

        source.connect(processorNode);
        processorNode.connect(audioCtx.destination);

        // 4. Start VAD
        if (vadReady && vadInstance) {
          await vadInstance.start();
          logEvent('VAD listening started');
        }

        // 5. Start camera
        await startCamera();

        sessionActive = true;
        vadSpeechActive = false;
        document.getElementById('btnSession').textContent = 'Stop Session';
        document.getElementById('btnSession').classList.add('active');
        setStatus('listening', 'Listening (session active)...');
        logEvent('Session started (mic + camera + VAD)');

        // Start silence timer immediately (student hasn't spoken yet)
        startSilenceTimer();

      } catch (err) {
        setStatus('error', 'Start error: ' + err.message);
        logEvent('Session start error: ' + err.message);
      }
    }

    async function stopSession() {
      sessionActive = false;
      stopSilenceTimer();

      // Stop VAD
      if (vadInstance && vadReady) {
        try { await vadInstance.pause(); } catch (e) { /* ok */ }
      }

      // Stop mic
      if (processorNode) { processorNode.disconnect(); processorNode = null; }
      if (micStream) { micStream.getTracks().forEach(function(t) { t.stop(); }); micStream = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }

      // Stop camera
      stopCamera();

      // Close WS
      if (ws) { ws.close(); ws = null; }

      tutorSpeaking = false;
      tutorSpeakingStartedAt = 0;
      studentSpeaking = false;
      vadSpeechActive = false;
      turnCompletePending = false;

      document.getElementById('btnSession').textContent = 'Start Session';
      document.getElementById('btnSession').classList.remove('active');
      setStatus('', 'Session ended');
      logEvent('Session stopped');
    }

    // =========================================================================
    // Camera capture — 1 FPS JPEG sent to backend via WebSocket
    // =========================================================================
    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: CAMERA_WIDTH },
            height: { ideal: CAMERA_HEIGHT },
            facingMode: 'environment',
          }
        });

        cameraVideo = document.getElementById('cameraVideo');
        cameraVideo.srcObject = cameraStream;
        // Wait for video to be ready
        await new Promise(function(resolve) {
          cameraVideo.onloadedmetadata = resolve;
        });
        await cameraVideo.play();

        cameraCanvas = document.getElementById('cameraCanvas');
        cameraCanvas.width = CAMERA_WIDTH;
        cameraCanvas.height = CAMERA_HEIGHT;
        cameraCtx2d = cameraCanvas.getContext('2d');

        cameraActive = true;
        cameraInterval = setInterval(captureAndSendFrame, 1000 / CAMERA_FPS);

        document.getElementById('cameraOffLabel').style.display = 'none';
        document.getElementById('btnCamera').textContent = 'Camera On';
        document.getElementById('btnCamera').classList.add('active');

        logEvent('Camera started (' + CAMERA_WIDTH + 'x' + CAMERA_HEIGHT + ' @ ' + CAMERA_FPS + ' FPS)');
      } catch (err) {
        logEvent('Camera error: ' + err.message);
        document.getElementById('cameraOffLabel').style.display = 'block';
      }
    }

    function stopCamera() {
      cameraActive = false;
      if (cameraInterval) { clearInterval(cameraInterval); cameraInterval = null; }
      if (cameraStream) {
        cameraStream.getTracks().forEach(function(t) { t.stop(); });
        cameraStream = null;
      }

      document.getElementById('cameraOffLabel').style.display = 'block';
      document.getElementById('btnCamera').textContent = 'Camera Off';
      document.getElementById('btnCamera').classList.remove('active');
      logEvent('Camera stopped');
    }

    function toggleCamera() {
      if (cameraActive) {
        stopCamera();
      } else if (sessionActive) {
        startCamera();
      }
    }

    function captureAndSendFrame() {
      if (!cameraActive || !cameraVideo || !ws || ws.readyState !== WebSocket.OPEN) return;

      cameraCtx2d.drawImage(cameraVideo, 0, 0, CAMERA_WIDTH, CAMERA_HEIGHT);
      var dataUrl = cameraCanvas.toDataURL('image/jpeg', CAMERA_QUALITY);
      var b64 = dataUrl.split(',')[1];

      ws.send(JSON.stringify({ type: 'video', data: b64 }));

      videoFramesSent++;

      // Track FPS over a 5-second window
      var now = performance.now();
      videoFpsWindow.push(now);
      while (videoFpsWindow.length > 0 && (now - videoFpsWindow[0]) > 5000) {
        videoFpsWindow.shift();
      }
    }

    // =========================================================================
    // Audio playback with instant cancellation
    // =========================================================================
    function playAudioChunk(b64Data) {
      if (!playbackCtx) {
        playbackCtx = new AudioContext({ sampleRate: PLAYBACK_RATE });
      }

      var raw = base64ToArrayBuffer(b64Data);
      var int16 = new Int16Array(raw);
      var float32 = new Float32Array(int16.length);
      for (var i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
      }

      var buffer = playbackCtx.createBuffer(1, float32.length, PLAYBACK_RATE);
      buffer.getChannelData(0).set(float32);

      var src = playbackCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(playbackCtx.destination);

      var now = playbackCtx.currentTime;
      if (nextPlayTime <= now) {
        nextPlayTime = now + 0.005;
      }
      src.start(nextPlayTime);

      var entry = { source: src, endTime: nextPlayTime + buffer.duration };
      scheduledSources.push(entry);
      src.onended = function() {
        var idx = scheduledSources.indexOf(entry);
        if (idx !== -1) scheduledSources.splice(idx, 1);
        maybeFinalizeTurnComplete();
      };

      nextPlayTime += buffer.duration;
    }

    function cancelPlayback() {
      for (var i = 0; i < scheduledSources.length; i++) {
        try { scheduledSources[i].source.stop(); } catch (e) { /* ok */ }
      }
      scheduledSources = [];
      nextPlayTime = 0;
      maybeFinalizeTurnComplete();
    }

    function maybeFinalizeTurnComplete() {
      if (!turnCompletePending) return;
      if (scheduledSources.length > 0) return;

      turnCompletePending = false;
      tutorSpeaking = false;
      tutorSpeakingStartedAt = 0;

      // Start silence timer after tutor finishes and student is quiet
      if (!studentSpeaking) {
        startSilenceTimer();
      }

      setStatus('listening', 'Listening...');
      logEvent('TURN_COMPLETE #' + turnCount + ' (audio drained)', 'evt-tc');
    }

    // =========================================================================
    // Silence timer — visual progress bar showing time until idle nudge
    // =========================================================================
    function startSilenceTimer() {
      if (silenceTimerInterval) return; // already running
      silenceStartedAt = performance.now();
      silenceTimerInterval = setInterval(updateSilenceDisplay, 100);
    }

    function stopSilenceTimer() {
      if (silenceTimerInterval) {
        clearInterval(silenceTimerInterval);
        silenceTimerInterval = null;
      }
      silenceStartedAt = 0;
      // Reset bar
      document.getElementById('silenceFill').style.width = '0%';
      document.getElementById('silenceFill').className = 'silence-fill';
      document.getElementById('silenceText').textContent = 'Silence: 0.0s / ' + IDLE_THRESHOLD_S + 's';
    }

    function updateSilenceDisplay() {
      if (silenceStartedAt === 0 || studentSpeaking || tutorSpeaking) {
        document.getElementById('silenceFill').style.width = '0%';
        document.getElementById('silenceFill').className = 'silence-fill';
        document.getElementById('silenceText').textContent = 'Silence: 0.0s / ' + IDLE_THRESHOLD_S + 's';
        return;
      }

      var elapsed = (performance.now() - silenceStartedAt) / 1000;
      var pct = Math.min(100, (elapsed / IDLE_THRESHOLD_S) * 100);

      var fill = document.getElementById('silenceFill');
      fill.style.width = pct + '%';

      var text = document.getElementById('silenceText');
      text.textContent = 'Silence: ' + elapsed.toFixed(1) + 's / ' + IDLE_THRESHOLD_S + 's';

      // Color transitions
      if (elapsed >= IDLE_THRESHOLD_S) {
        fill.className = 'silence-fill triggered';
      } else if (elapsed >= IDLE_THRESHOLD_S * 0.66) {
        fill.className = 'silence-fill warning';
      } else if (elapsed >= IDLE_THRESHOLD_S * 0.33) {
        fill.className = 'silence-fill';
      } else {
        fill.className = 'silence-fill';
      }
    }

    // =========================================================================
    // Metrics display
    // =========================================================================
    function updateMetrics() {
      document.getElementById('mProactive').textContent = proactiveCount;
      document.getElementById('mNudges').textContent = backendNudges;
      document.getElementById('mOrganic').textContent = organicCount + ' / ' + nudgeCount;
      document.getElementById('mTurns').textContent = turnCount;
      document.getElementById('mFalsePos').textContent = falsePositives;
      document.getElementById('mVideoFrames').textContent = videoFramesSent;

      // Average trigger silence
      if (triggerSilences.length > 0) {
        var avg = triggerSilences.reduce(function(a, b) { return a + b; }, 0) / triggerSilences.length;
        document.getElementById('mAvgTrigger').textContent = avg.toFixed(1) + 's';
      } else {
        document.getElementById('mAvgTrigger').textContent = '\u2014';
      }

      // Video FPS (frames in last 5s window)
      if (videoFpsWindow.length > 1) {
        var span = (videoFpsWindow[videoFpsWindow.length - 1] - videoFpsWindow[0]) / 1000;
        var fps = span > 0 ? (videoFpsWindow.length - 1) / span : 0;
        document.getElementById('mVideoFps').textContent = fps.toFixed(1);
      } else {
        document.getElementById('mVideoFps').textContent = cameraActive ? '...' : '0.0';
      }
    }

    // =========================================================================
    // UI helpers
    // =========================================================================
    function setStatus(state, label) {
      document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
      document.getElementById('statusLabel').textContent = label;
    }

    function addTranscript(type, text) {
      var panel = document.getElementById('transcript');
      var entry = document.createElement('div');
      entry.className = 't-entry ' + type;

      var timeStr = new Date().toLocaleTimeString('en-US', {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      var labels = {
        tutor: 'Tutor: ', student: 'Student: ', event: 'GEMINI: ',
        proactive: 'PROACTIVE: ', nudge: 'NUDGE: ', error: 'ERROR: '
      };

      var timeSpan = document.createElement('span');
      timeSpan.className = 't-time';
      timeSpan.textContent = timeStr;

      var labelSpan = document.createElement('span');
      labelSpan.className = 't-label';
      labelSpan.textContent = labels[type] || '';

      var textSpan = document.createElement('span');
      textSpan.className = 't-text';
      textSpan.textContent = text;

      entry.appendChild(timeSpan);
      entry.appendChild(labelSpan);
      entry.appendChild(textSpan);
      panel.insertBefore(entry, panel.firstChild);

      // Forward transcript to backend for logging
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'client_log',
          event: 'transcript_' + type,
          text: text,
        }));
      }
    }

    function logEvent(text, cls) {
      var log = document.getElementById('eventLog');
      var entry = document.createElement('div');
      entry.className = 'evt' + (cls ? ' ' + cls : '');
      var timeStr = new Date().toLocaleTimeString('en-US', {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
        fractionalSecondDigits: 3
      });
      entry.textContent = '[' + timeStr + '] ' + text;
      log.insertBefore(entry, log.firstChild);

      // Forward to backend
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'client_log',
          event: cls || 'info',
          text: text,
          state: {
            tutorSpeaking: tutorSpeaking,
            studentSpeaking: studentSpeaking,
            vadSpeechActive: vadSpeechActive,
            cameraActive: cameraActive,
            silenceS: silenceStartedAt > 0 ? ((performance.now() - silenceStartedAt) / 1000).toFixed(1) : '0',
            videoFrames: videoFramesSent,
          }
        }));
      }
    }

    function clearAll() {
      var transcript = document.getElementById('transcript');
      while (transcript.firstChild) transcript.removeChild(transcript.firstChild);
      var eventLog = document.getElementById('eventLog');
      while (eventLog.firstChild) eventLog.removeChild(eventLog.firstChild);

      proactiveCount = 0; organicCount = 0; nudgeCount = 0;
      backendNudges = 0; falsePositives = 0; turnCount = 0;
      triggerSilences = []; videoFramesSent = 0; videoFpsWindow = [];
      updateMetrics();
    }

    // =========================================================================
    // Conversion utilities
    // =========================================================================
    function float32ToInt16(float32Array) {
      var int16 = new Int16Array(float32Array.length);
      for (var i = 0; i < float32Array.length; i++) {
        var s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return int16;
    }

    function arrayBufferToBase64(buffer) {
      var bytes = new Uint8Array(buffer);
      var binary = '';
      for (var i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
      var binary = atob(base64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    // =========================================================================
    // Periodic metrics refresh
    // =========================================================================
    setInterval(updateMetrics, 1000);
  </script>
</body>
